services:
  traefik:
    image: traefik:v3.1
    container_name: hardware-monitor-traefik
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    command:
      - /bin/sh
      - -ec
      - |
        cat > /etc/traefik/dynamic.yml <<EOF
        http:
          routers:
            hardware-monitor-http:
              entryPoints:
                - web
              rule: "Host(\`${TRAEFIK_DOMAIN}\`)"
              middlewares:
                - hardware-monitor-https-redirect
              service: hardware-monitor
            hardware-monitor:
              entryPoints:
                - websecure
              rule: "Host(\`${TRAEFIK_DOMAIN}\`)"
              tls:
                certResolver: letsencrypt
              service: hardware-monitor
          middlewares:
            hardware-monitor-https-redirect:
              redirectScheme:
                scheme: https
          services:
            hardware-monitor:
              loadBalancer:
                servers:
                  - url: "http://server:8000"
        EOF
        exec traefik \
          --providers.file.filename=/etc/traefik/dynamic.yml \
          --providers.file.watch=true \
          --entrypoints.web.address=:80 \
          --entrypoints.websecure.address=:443 \
          --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL} \
          --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json \
          --certificatesresolvers.letsencrypt.acme.httpchallenge=true \
          --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt_data:/letsencrypt
    networks:
      - monitor-net

  postgres:
    image: postgres:16-alpine
    container_name: hardware-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hardware_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-monitor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor_user} -d ${POSTGRES_DB:-hardware_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-net

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hardware-monitor-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_API_KEY: ${SERVER_API_KEY:-change-me}
      START_ADMIN_USERNAME: ${START_ADMIN_USERNAME:-admin}
      START_ADMIN_PASSWORD: ${START_ADMIN_PASSWORD:-changeme-admin-password}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://monitor_user:monitor_password@postgres:5432/hardware_monitor}
      STALE_AFTER_SECONDS: ${STALE_AFTER_SECONDS:-180}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_SSLMODE: ${DB_SSLMODE:-}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - monitor-net

volumes:
  postgres_data:
  letsencrypt_data:

networks:
  monitor-net:
